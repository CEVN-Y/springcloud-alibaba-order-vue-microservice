spring:
  # 解决 Nacos 启动报错
  config:
    import: optional:nacos:${spring.application.name}.yml

  datasource:
    url: jdbc:mysql://localhost:3306/db_user?serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: my_group
  service:
    vgroup-mapping:
      my_group: default
  registry:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
      group: SEATA_GROUP
  enable-auto-data-source-proxy: true

server:
  port: 8081